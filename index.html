    :root{
      --bg-1:#04060c; --bg-2:#091223; --bg-3:#070b14;

      --gold:#f7c96d; --gold-2:#d49d38; --text:#f6f7fb; --muted:#aab3c7;
      --radius-xl:30px; --radius-lg:24px;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{
      margin:0; font-family: 'Inter', Arial, sans-serif; color:var(--text);

    }
    .wrap{max-width:1200px; margin:0 auto; padding:0 24px;}
    .topbar{position:sticky; top:0; z-index:100; backdrop-filter:blur(15px); background:rgba(5,9,17,0.8); border-bottom:1px solid var(--line); padding:15px 0;}

    .brand-badge{width:40px; height:40px; border-radius:10px; background:linear-gradient(135deg, #ffe2a3, #b6781f); display:grid; place-items:center; color:#111;}
    
    .hero{padding:80px 0 60px;}
    .hero-grid{display:grid; grid-template-columns:1fr 1fr; gap:50px; align-items:center;}

    h1{font-size:clamp(32px, 5vw, 54px); line-height:1.1; margin:0 0 25px; letter-spacing:-1.5px;}
    .lead{font-size:19px; color:var(--muted); margin-bottom:35px;}
    
    .btn{padding:18px 35px; border-radius:12px; text-decoration:none; font-weight:800; display:inline-block; transition:0.3s; font-size:16px; border:none; cursor:pointer;}
    .btn-primary{background:linear-gradient(135deg, #ffe2a3, var(--gold-2)); color:#111; box-shadow:0 10px 30px rgba(212,157,56,0.3);}

    .hero-visual{position:relative; cursor:pointer; transition: transform 0.3s ease;}
    .hero-visual:hover{transform: scale(1.02);}
    .hero-visual img{width:100%; border-radius:var(--radius-xl); border:1px solid var(--line); box-shadow: 0 25px 60px rgba(0,0,0,0.6); display:block; aspect-ratio:16/10; object-fit:cover;}
    .visual-overlay{position:absolute; bottom:20px; left:20px; background:rgba(0,0,0,0.8); color:#fff; padding:10px 20px; border-radius:50px; font-size:13px; font-weight:bold; border:1px solid var(--gold);}

    .form-section{padding:60px 0;}

    .form-container h3{font-size:30px; margin-bottom:10px;}

    }
    textarea{height:120px; resize: none;}
