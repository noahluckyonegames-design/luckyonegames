<!doctype html>
<html lang="en">
<head>
  <script async src="https://www.googletagmanager.com/gtag/js?id=AW-18041424138"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'AW-18041424138');

  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LuckyOne Games | Enterprise B2B Gaming Platforms for US Suppliers</title>
  
  <style>
    :root {
      --gold: #dcb362;
      --gold-hover: #f1c775;
      --radius: 12px;
    }
    
    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    
    body {
      margin: 0; padding: 0;
      font-family: 'Inter', -apple-system, sans-serif;
      /* 💡 [핵심] 사장님이 좋아하신 그 랜더링 시안(image_13.png)을 통째로 배경으로 지정 */
      background-image: url('image_13.png'); 
      background-size: cover; /* 화면에 꽉 차게 */
      background-position: center top; /* 가운데 상단 기준 */
      background-attachment: fixed; /* 스크롤 해도 배경 고정 */
      background-color: #070b14; /* 이미지 로딩 전 배경색 */
      color: #fff;
    }

    /* 💡 배경 이미지가 워낙 고화질이라, 스크롤을 만들어주기 위한 투명한 높이값 */
    .scroller { height: 400vh; position: relative; }

    /* 💡 [핵심] 문의 폼을 시안의 우측 하단 폼 자리에 정확히 얹기 (절대 좌표 사용) */
    .form-overlay {
      position: absolute;
      top: 310vh; /* 시안 속 폼이 시작되는 대략적인 높이 (조정 가능) */
      right: 5%;   /* 시안 속 폼의 우측 여백 */
      width: 450px; /* 시안 속 폼의 너비 */
      
      background: rgba(13, 20, 36, 0.95); /* 시안과 유사한 다크 패널 배경 */
      border: 1px solid rgba(255, 255, 255, 0.08);
      padding: 50px;
      border-radius: var(--radius);
      box-shadow: 0 40px 80px rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      z-index: 10;
    }
    
    .form-overlay h3 { margin-top: 0; font-size: 28px; color: var(--gold); margin-bottom: 20px; text-align: center; text-transform: uppercase;}
    
    input, select, textarea { 
      width: 100%; padding: 18px; margin-bottom: 25px; border-radius: 10px; 
      border: 1px solid rgba(255, 255, 255, 0.1); background: rgba(0,0,0,0.5); 
      color: #fff; font-size: 16px; font-family: inherit;
    }
    input:focus, select:focus, textarea:focus { border-color: var(--gold); outline: none; }
    textarea { height: 120px; resize: none; }

    .btn { padding: 18px 35px; border-radius: 50px; text-decoration: none; font-weight: 800; display: inline-block; transition: 0.3s; font-size: 16px; text-align: center; cursor: pointer; border: none; width: 100%; }
    .btn-primary { background: var(--gold); color: #000; box-shadow: 0 4px 15px rgba(220, 179, 98, 0.2); }
    .btn-primary:hover { background: var(--gold-hover); transform: translateY(-2px); box-shadow: 0 6px 20px rgba(220, 179, 98, 0.4); }

    /* 모바일 대응 (폼 위치 조정) */
    @media (max-width: 900px) {
      .form-overlay {
        position: static; margin: 100px auto; width: 90%; padding: 30px;
      }
      .scroller { height: auto; }
      body { background-attachment: scroll; background-size: contain; background-repeat: no-repeat; }
    }
  </style>
</head>
<body>

<div class="scroller">
  
  <div id="apply" class="form-overlay">
    <h3>Territory Access</h3>
    <p style="color:#a0abbf; text-align:center; margin-bottom:30px; font-size:14px;">Direct player support not provided. Business entities only.</p>
    
    <form action="https://formspree.io/f/mdawqqqp" method="POST">
      <input type="hidden" name="_next" value="https://luckyonegames.com/thank-you.html">
      <input type="text" name="name" placeholder="Contact Full Name" required>
      <input type="email" name="email" placeholder="Business Email" required>
      
      <select name="business_type" required>
        <option value="">Select Business Size</option>
        <option value="Single Store">Single Store / Internet Cafe</option>
        <option value="Multiple Venues">Multiple Venues (2-10 locations)</option>
        <option value="Regional Distributor">Regional Distributor</option>
        <option value="Online Only">Online Only Operator</option>
      </select>
      
      <select name="state" required>
        <option value="">Select Target State</option>
        <option value="Texas">Texas</option>
        <option value="Florida">Florida</option>
        <option value="Arizona">Arizona</option>
        <option value="Carolinas">North/South Carolina</option>
        <option value="Other">Other US State</option>
      </select>
      
      <textarea name="message" placeholder="Describe your operations..." required></textarea>
      <button type="submit" class="btn btn-primary">Submit Inquiry</button>
    </form>
  </div>

</div>

</body>
</html>
